<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #343541;
      color: #ececf1;
      font-family: 'Inter', Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .chatgpt-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      background: #343541;
    }
    .chatgpt-header {
      padding: 1.5rem 2rem 1rem 2rem;
      background: #343541;
      color: #ececf1;
      font-size: 1.5rem;
      font-weight: 600;
      border-bottom: 1px solid #444654;
      letter-spacing: 1px;
    }
    .chatgpt-messages {
      flex: 1;
      padding: 2rem 2rem 1rem 2rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      background: #343541;
    }
    .chatgpt-message {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      max-width: 100%;
    }
    .chatgpt-avatar {
      width: 38px;
      height: 38px;
      border-radius: 6px;
      background: #444654;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.1rem;
      color: #ececf1;
      flex-shrink: 0;
    }
    .chatgpt-message.user .chatgpt-avatar {
      background: #19c37d;
      color: #fff;
    }
    .chatgpt-message-content {
      background: #444654;
      color: #ececf1;
      padding: 1rem 1.2rem;
      border-radius: 8px;
      font-size: 1.05rem;
      line-height: 1.6;
      max-width: 700px;
      word-break: break-word;
    }
    .chatgpt-message.user .chatgpt-message-content {
      background: #3c3f4a;
      color: #fff;
    }
    .chatgpt-input-area {
      padding: 1.5rem 2rem;
      background: #343541;
      border-top: 1px solid #444654;
      display: flex;
      align-items: flex-end;
      gap: 1rem;
    }
    .chatgpt-input {
      flex: 1;
      resize: none;
      border: none;
      border-radius: 8px;
      padding: 1rem;
      font-size: 1.1rem;
      background: #40414f;
      color: #ececf1;
      min-height: 48px;
      max-height: 160px;
      outline: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .chatgpt-send-btn {
      background: #19c37d;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.8rem 1.6rem;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .chatgpt-send-btn:hover {
      background: #179a6a;
    }
    @media (max-width: 700px) {
      .chatgpt-container {
        max-width: 100vw;
      }
      .chatgpt-header, .chatgpt-messages, .chatgpt-input-area {
        padding-left: 1rem;
        padding-right: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="chatgpt-container">
    <div class="chatgpt-header">ChatGPT</div>
    <div class="chatgpt-messages" id="chatgptMessages"></div>
    <form class="chatgpt-input-area" id="chatgptForm" autocomplete="off">
      <textarea class="chatgpt-input" id="chatgptInput" placeholder="Send a message..." required></textarea>
      <button class="chatgpt-send-btn" type="submit">Send</button>
    </form>
  </div>
  <script>
    const chatgptMessages = document.getElementById('chatgptMessages');
    const chatgptForm = document.getElementById('chatgptForm');
    const chatgptInput = document.getElementById('chatgptInput');

    function appendMessage(role, text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `chatgpt-message ${role}`;
      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'chatgpt-avatar';
      avatarDiv.textContent = role === 'user' ? 'You' : 'GPT';
      const contentDiv = document.createElement('div');
      contentDiv.className = 'chatgpt-message-content';
      contentDiv.textContent = text;
      msgDiv.appendChild(avatarDiv);
      msgDiv.appendChild(contentDiv);
      chatgptMessages.appendChild(msgDiv);
      chatgptMessages.scrollTop = chatgptMessages.scrollHeight;
    }

    chatgptForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const userText = chatgptInput.value.trim();
      if (!userText) return;
      appendMessage('user', userText);
      chatgptInput.value = '';
      // Simulate GPT response
      setTimeout(() => {
        appendMessage('assistant', 'This is a sample ChatGPT response. (Integrate with backend for real answers)');
      }, 700);
    });
  </script>
</body>
</html>
